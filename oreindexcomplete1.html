  <style>
    * {
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      padding: 0;
      background: #f4f5fb;
      color: #111827;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      gap: 16px;
    }

    header h1 {
      margin: 0;
      font-size: 1.9rem;
      letter-spacing: 0.03em;
    }

    header p {
      margin: 4px 0 0;
      color: #6b7280;
      font-size: 0.9rem;
    }

    .filters-card {
      background: #ffffff;
      border-radius: 18px;
      padding: 18px 18px 8px;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
      margin-bottom: 20px;
      border: 1px solid rgba(148, 163, 184, 0.35);
    }

    .filters-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      gap: 12px;
    }

    .filters-header h2 {
      margin: 0;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #4b5563;
    }

    .filters-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 0.85rem;
    }

    .field label {
      font-weight: 600;
      color: #374151;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-size: 0.75rem;
    }

    .field input,
    .field select {
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid #d1d5db;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, background-color 0.15s ease;
      background-color: #f9fafb;
    }

    .field input:focus,
    .field select:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 1px rgba(79, 70, 229, 0.25);
      background-color: #ffffff;
    }

    .filters-actions {
      margin-top: 10px;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .btn {
      border-radius: 999px;
      padding: 7px 14px;
      font-size: 0.8rem;
      border: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .btn-primary {
      background: linear-gradient(135deg, #4f46e5, #6366f1);
      color: white;
      box-shadow: 0 10px 25px rgba(79, 70, 229, 0.35);
    }

    .btn-ghost {
      background: transparent;
      color: #4b5563;
      border: 1px solid #d1d5db;
    }

    .btn-primary:hover {
      filter: brightness(1.03);
    }

    .btn-ghost:hover {
      background-color: #f3f4f6;
    }

    .results-card {
      background: #ffffff;
      border-radius: 18px;
      padding: 16px 18px 6px;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.06);
      border: 1px solid rgba(148, 163, 184, 0.3);
    }

    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      gap: 12px;
    }

    .results-header h2 {
      margin: 0;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #4b5563;
    }

    .results-count {
      font-size: 0.8rem;
      color: #6b7280;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    thead {
      background: #f9fafb;
    }

    th,
    td {
      padding: 8px 10px;
      text-align: left;
    }

    th {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #6b7280;
      border-bottom: 1px solid #e5e7eb;
    }

    tbody tr:nth-child(even) {
      background: #f9fafb;
    }

    tbody tr:hover {
      background: #eef2ff;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 0.7rem;
      background-color: #eef2ff;
      color: #4f46e5;
      font-weight: 500;
    }

    @media (max-width: 640px) {
      header {
        flex-direction: column;
        align-items: flex-start;
      }

      .results-card {
        padding-inline: 12px;
      }

      th:nth-child(3),
      th:nth-child(4),
      td:nth-child(3),
      td:nth-child(4) {
        display: none;
      }
    }
  </style>
</head>

    const titoloInput = document.getElementById("f-titolo");
    const autoreInput = document.getElementById("f-autore");
    const collocazioneInput = document.getElementById("f-collocazione");
    const argomentoInput = document.getElementById("f-argomento");

    function renderRows(rows) {
      bodyEl.innerHTML = "";

      if (!rows.length) {
        const tr = document.createElement("tr");
        const td = document.createElement("td");
        td.colSpan = 4;
        td.textContent = "Nessuna opera trovata con i filtri selezionati.";
        td.style.color = "#6b7280";
        tr.appendChild(td);
        bodyEl.appendChild(tr);
      } else {
        rows.forEach((item) => {
          const tr = document.createElement("tr");

          const tdTitolo = document.createElement("td");
          tdTitolo.textContent = item.titolo;
          tr.appendChild(tdTitolo);

          const tdAutore = document.createElement("td");
          tdAutore.textContent = item.autore;
          tr.appendChild(tdAutore);

          const tdCollocazione = document.createElement("td");
          tdCollocazione.innerHTML = '<span class="badge">' + item.collocazione + "</span>";
          tr.appendChild(tdCollocazione);

          const tdArgomento = document.createElement("td");
          tdArgomento.textContent = item.argomento;
          tr.appendChild(tdArgomento);

          bodyEl.appendChild(tr);
        });
      }

      countEl.textContent = rows.length === 1
        ? "1 opera trovata"
        : rows.length + " opere trovate";
    }

    function applyFilters() {
      const titolo = titoloInput.value.trim().toLowerCase();
      const autore = autoreInput.value.trim().toLowerCase();
      const collocazione = collocazioneInput.value.trim().toLowerCase();
      const argomento = argomentoInput.value.trim().toLowerCase();

      const filtered = catalogData.filter((item) => {
        const matchTitolo = !titolo || item.titolo.toLowerCase().includes(titolo);
        const matchAutore = !autore || item.autore.toLowerCase().includes(autore);
        const matchCollocazione =
          !collocazione || item.collocazione.toLowerCase().includes(collocazione);
        const matchArgomento = !argomento || item.argomento.toLowerCase().includes(argomento);
        return matchTitolo && matchAutore && matchCollocazione && matchArgomento;
      });

      renderRows(filtered);
    }

    function resetFilters() {
      titoloInput.value = "";
      autoreInput.value = "";
      collocazioneInput.value = "";
      argomentoInput.value = "";
      renderRows(catalogData);
    }

    document.getElementById("btn-filtra").addEventListener("click", applyFilters);
    document.getElementById("btn-reset").addEventListener("click", resetFilters);

    [titoloInput, autoreInput, collocazioneInput, argomentoInput].forEach((el) => {
      el.addEventListener("keyup", (e) => {
        if (e.key === "Enter") applyFilters();
      });
      el.addEventListener("change", applyFilters);
    });

    renderRows(catalogData);
